name: Deploy Rastriya Aawaj

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Download the latest version of the theme from GitHub.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Node.js so the build tools can run.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('src/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install the Node packages required by the build scripts.
      - name: Install Node dependencies
        working-directory: src
        run: npm install

      # Compile SCSS to CSS and minify JS before deployment.
      - name: Build CSS and JS assets
        working-directory: src
        run: npm run build

      # Use ssh-agent with the repository private key and rsync over SSH.
      - name: Start SSH agent and load key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server with rsync
        run: |
          mkdir -p /tmp/deploy
          rsync -avz --delete --exclude '.git' --exclude '.github' --exclude 'node_modules' --exclude '.vscode' --exclude '*.log' --exclude 'src/node_modules' --exclude 'src/.git' ./ rastriya1@${{ secrets.SSH_HOST }}:/public_html/wp-content/themes/nepal-aawaj
