name: Deploy Rastriya Aawaj

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Download the latest version of the theme from GitHub.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Node.js so the build tools can run.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('src/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install the Node packages required by the build scripts.
      - name: Install Node dependencies
        working-directory: src
        run: npm install

      # Compile SCSS to CSS and minify JS before deployment.
      - name: Build CSS and JS assets
        working-directory: src
        run: npm run build

      - name: Verify SSH key in CI runner
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -lf ~/.ssh/id_ed25519
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || 22 }} rastriya1@${{ secrets.SSH_HOST }} true

      - name: Deploy to server with rsync and private key file
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          rsync -avz --delete --exclude '.git' --exclude '.github' --exclude 'node_modules' --exclude '.vscode' --exclude '*.log' --exclude 'src/node_modules' --exclude 'src/.git' -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" ./ rastriya1@${{ secrets.SSH_HOST }}:/public_html/wp-content/themes/nepal-aawaj
